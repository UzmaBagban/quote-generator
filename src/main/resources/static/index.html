<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>✨ Quote Generator</h1>

    <div class="input-section">
        <label for="nameInput">Enter your name:</label>
        <input
                type="text"
                id="nameInput"
                placeholder="e.g., Uzma"
                value="Friend"
        >
        <button id="getQuoteBtn">Get Quote</button>
    </div>

    <div id="quoteSection" class="quote-section hidden">
        <div class="quote-card">
            <p id="quoteMessage" class="quote-message"></p>
           <!-- <div id="quoteObject" class="quote-object"></div> -->
            <p id="quoteAuthor" class="quote-author"></p>
        </div>
    </div>

    <div id="errorMessage" class="error hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
